name: lens_elearning
description: Lens for E-Learning mobile app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client
  dio: ^5.4.0
  
  # Local Storage
  sqflite: ^2.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Image Processing
  image_picker: ^1.0.7
  image: ^4.1.3
  camera: ^0.10.5+9
  flutter_image_compress: ^2.1.0
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  path: ^1.9.0
  
  # Authentication
  flutter_secure_storage: ^9.0.0
  
  # UI Components
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
